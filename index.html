<script>
let products = JSON.parse(localStorage.getItem('products')) || [
  {id:1,name:"BCH Jari",desc:"Premium BCH jari jo har tarah ke embroidery aur textile kaam ke liye suitable hai.",icon:"✦",inStock:true,price:"Call for Price",photo:null},
  {id:2,name:"Silver Jari",desc:"Chamakdar silver tone jari thread.",icon:"◈",inStock:true,price:"Call for Price",photo:null},
  {id:3,name:"Antique Jari",desc:"Classic antique finish jari.",icon:"❖",inStock:true,price:"Call for Price",photo:null},
];

let currentFilter='all',editingId=null,priceEditId=null,nextId=4,currentPhoto=null;
const icons=["✦","◈","❖","★","◇","⬡","❋","✿","◉","⊕","✪","⬟"];

function saveToStorage(){
  localStorage.setItem('products', JSON.stringify(products));
}

function renderProducts(){
  const grid=document.getElementById('product-grid');
  const filtered=products.filter(p=>{
    if(currentFilter==='in')return p.inStock;
    if(currentFilter==='out')return !p.inStock;
    return true;
  });

  if(filtered.length===0){
    grid.innerHTML='<div class="empty-state"><div class="big-icon">📦</div><p>No product found</p></div>';
    return;
  }

  grid.innerHTML=filtered.map(p=>`
    <div class="product-card ${!p.inStock?'out-of-stock':''}">
      ${!p.inStock?'<div class="out-of-stock-overlay">OUT OF STOCK</div>':''}
      <div class="product-img">${p.photo?'<img src="'+p.photo+'"/>':p.icon}</div>
      <div class="product-body">
        <h3>${p.name}</h3>
        <p class="desc">${p.desc||''}</p>

        <div class="price-tag">₹ ${p.price}
          <button class="edit-price-btn" onclick="showPriceEdit(${p.id})">✎</button>
        </div>

        <div class="price-input-wrap ${priceEditId===p.id?'show':''}">
          <input type="text" id="pi-${p.id}" value="${p.price}">
          <button onclick="savePrice(${p.id})">Save</button>
        </div>

        <div class="product-footer">
          <span class="stock-badge ${p.inStock?'in-stock':'out-badge'}">
            ${p.inStock?'In Stock':'Out of Stock'}
          </span>
          <div class="card-actions">
            <button onclick="toggleStock(${p.id})">Toggle</button>
            <button onclick="openEditModal(${p.id})">Edit</button>
            <button onclick="deleteProduct(${p.id})">Delete</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(){
  editingId=null;
  currentPhoto=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-stock').value='in';
  document.getElementById('photo-preview').style.display='none';
  document.getElementById('modal-overlay').classList.add('show');
}

function openEditModal(id){
  const p=products.find(x=>x.id===id);
  editingId=id;
  currentPhoto=p.photo;

  document.getElementById('f-name').value=p.name;
  document.getElementById('f-desc').value=p.desc;
  document.getElementById('f-price').value=p.price;
  document.getElementById('f-stock').value=p.inStock?'in':'out';

  const prev=document.getElementById('photo-preview');
  if(p.photo){
    prev.src=p.photo;
    prev.style.display='block';
  }

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}

function previewPhoto(input){
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    currentPhoto=e.target.result;
    const prev=document.getElementById('photo-preview');
    prev.src=currentPhoto;
    prev.style.display='block';
  };
  reader.readAsDataURL(file);
}

function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ alert('Name required'); return; }

  const desc=document.getElementById('f-desc').value;
  const price=document.getElementById('f-price').value || 'Call for Price';
  const inStock=document.getElementById('f-stock').value==='in';

  if(editingId){
    const p=products.find(x=>x.id===editingId);
    p.name=name;
    p.desc=desc;
    p.price=price;
    p.inStock=inStock;
    if(currentPhoto) p.photo=currentPhoto;
  } else {
    products.push({
      id:Date.now(),
      name,desc,price,inStock,
      icon:icons[Math.floor(Math.random()*icons.length)],
      photo:currentPhoto
    });
  }

  saveToStorage();
  closeModal();
  renderProducts();
}

function showPriceEdit(id){
  priceEditId=id;
  renderProducts();
}

function savePrice(id){
  const inp=document.getElementById('pi-'+id);
  const p=products.find(x=>x.id===id);
  p.price=inp.value;

  saveToStorage();
  priceEditId=null;
  renderProducts();
}

function toggleStock(id){
  const p=products.find(x=>x.id===id);
  p.inStock=!p.inStock;

  saveToStorage();
  renderProducts();
}

function deleteProduct(id){
  products=products.filter(x=>x.id!==id);

  saveToStorage();
  renderProducts();
}

function filterProducts(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

renderProducts();
</script>
</body>
</html>
